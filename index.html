<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Descarte de Medicamentos</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <!-- Leaflet -->
  <link 
    rel="stylesheet" 
    href="https://unpkg.com/leaflet/dist/leaflet.css"
  />

  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header>
    <h1>Descarte de Medicamentos</h1>
    <p>Encontre farmácias próximas e consulte a melhor rota.</p>

    <div class="busca">
      <input 
        type="text" 
        id="campoLocalizacao" 
        placeholder="Digite sua cidade, bairro ou endereço"
      >
      <button id="botaoBuscar" onclick="buscarPorTexto()">Buscar</button>
    </div>

    <button id="botaoLocalizacao" onclick="pegarLocalizacao()">
      Usar minha localização atual
    </button>

  </header>

  <main>
    <div id="map"></div>

    <section id="resultado">
      <h2>Farmácias próximas</h2>
      <p id="status">Digite uma localização ou use sua localização atual.</p>
      <ul id="lista"></ul>
    </section>
  </main>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="script.js"></script>
</body>
</html>
